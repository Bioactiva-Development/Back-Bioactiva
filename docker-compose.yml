name: back-bioactiva

services:
  bioactiva-database:
    profiles: ["local"]
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-app}
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app}
    ports:
      - "${DB_PORT:-5435}:5432"
    volumes:
      - back_bioactiva_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  bioactiva-redis:
    profiles: ["local"]
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-dev}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dev", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bioactiva-sunat-local:
    profiles: ["local"]
    build:
      context: ./sunat-app
      dockerfile: Dockerfile
    ports:
      - "${SUNAT_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s


  bioactiva-sunat-prod:
    profiles: ["testing"]
    build:
      context: ./sunat-app
      dockerfile: Dockerfile
    container_name: bioactiva-sunat-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - proxy_net

  bioactiva-sunat-development:
    profiles: ["development"]
    build:
      context: ./sunat-app
      dockerfile: Dockerfile
    container_name: bioactiva-sunat-development
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - proxy_net

  bioactiva-backend-local:
    profiles: ["local"]
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      bioactiva-database:
        condition: service_healthy
      bioactiva-redis:
        condition: service_healthy
      bioactiva-sunat-local:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      PYTHON_SCRAPER_URL: ${PYTHON_SCRAPER_URL:-http://bioactiva-sunat-local:8000}
    command: >
      sh -c "npx prisma migrate deploy &&
            exec node -r tsconfig-paths/register dist/main"

  bioactiva-backend-prod:   
    profiles: ["testing"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bioactiva-backend-prod
    restart: unless-stopped
    depends_on:
      bioactiva-sunat-prod:
        condition: service_healthy
    env_file:
      - ${BIOACTIVA_ENV_FILE}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      PYTHON_SCRAPER_URL: ${PYTHON_SCRAPER_URL:-http://bioactiva-sunat-prod:8000}
    command: >
      sh -c "npx prisma migrate deploy &&
            exec node -r tsconfig-paths/register dist/main"
    networks:
      - proxy_net

  bioactiva-backend-development:
    profiles: ["development"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bioactiva-backend-development
    restart: unless-stopped
    depends_on:
      bioactiva-sunat-development:
        condition: service_healthy
    env_file:
      - ${BIOACTIVA_ENV_FILE}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      PYTHON_SCRAPER_URL: ${PYTHON_SCRAPER_URL_DEV:-http://bioactiva-sunat-development:8000}
    command: >
      sh -c "npx prisma migrate deploy &&
            exec node -r tsconfig-paths/register dist/main"
    networks:
      - proxy_net

volumes:
  back_bioactiva_pgdata:

networks:
  proxy_net:
    external: true