services:
  bioactiva-database:
    profiles: ["local"]
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-app}
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app}
    ports:
      - "${DB_PORT:-5435}:5432"
    volumes:
      - back_bioactiva_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
      
  bioactiva-redis:
    profiles: ["local"]
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-dev}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dev", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bioactiva-backend-local:
    profiles: ["local"]
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      bioactiva-database:
        condition: service_healthy
      bioactiva-redis:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}

      FRONTEND_URL: ${FRONTEND_URL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS}

      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      REFRESH_TOKEN_COOKIE_NAME: ${REFRESH_TOKEN_COOKIE_NAME}

      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS}
      RESEND_TOKEN: ${RESEND_TOKEN}
      MAIL_PROVIDER: ${MAIL_PROVIDER}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
    command: >
      sh -c "npx prisma migrate deploy &&
            exec node -r tsconfig-paths/register dist/src/main"

  bioactiva-backend-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bioactiva-backend-prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
    command: >
      sh -c "npx prisma migrate deploy &&
            exec node -r tsconfig-paths/register dist/src/main"
    networks:
      - proxy_net

volumes:
  back_bioactiva_pgdata:

networks:
  proxy_net:
    external: true