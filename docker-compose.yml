services:

  db:
    profiles:
      - local

    image: postgres:17-alpine

    container_name: back-bioactiva-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-back_bioactiva}
      POSTGRES_USER: ${POSTGRES_USER:-back_bioactiva}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-back_bioactiva}

    ports:
      - "5432:5432"

    volumes:
      - back_bioactiva_pgdata:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-back_bioactiva} -d ${POSTGRES_DB:-back_bioactiva}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: back-bioactiva-api

    restart: unless-stopped

    profiles:
      - local
      - default

    depends_on:
      db:
        condition: service_healthy
        required: false

    ports:
      - "3000:3000"

    env_file:
      - .env

    environment:
      NODE_ENV: production
      PORT: 3000

      DATABASE_URL: ${DB_BIOACTIVA:-${DATABASE_URL}}
      REDIS_URL: ${REDIS_BIOACTIVA:-${REDIS_URL}}

    command: >
      sh -c "pnpm prisma migrate deploy &&
             exec node -r tsconfig-paths/register dist/main"

volumes:
  back_bioactiva_pgdata: